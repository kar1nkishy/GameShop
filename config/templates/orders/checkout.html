{% extends "base.html" %}
{% block title %}Checkout{% endblock %}
{% block content %}
<h1>💳 Checkout</h1>

<form method="post">
  {% csrf_token %}
  <h3>📋 Customer Information</h3>

  <div>
    <label for="full_name">Full Name *</label>
    <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
  </div>

  <div>
    <label for="phone">Phone *</label>
    <input type="text" id="phone" name="phone" required placeholder="+1 (555) 123-4567">
  </div>

  <div>
    <label for="address">Shipping Address *</label>
    <input type="text" id="address" name="address" required placeholder="123 Main St, City, Country">
  </div>

  <button type="submit" class="btn btn-success">✅ Place Order</button>
</form>

<div class="action-row" style="margin-top: 30px; text-align: center;">
  <a href="{% url 'cart' %}" class="btn btn-primary">⬅️ Back to Cart</a>
</div>
{% endblock %}
